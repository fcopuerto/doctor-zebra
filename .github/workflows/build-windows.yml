name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --noconfirm --clean build_desktop.spec

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\ZebraLabels.exe")) {
            Write-Error "dist\ZebraLabels.exe not found after build"
            exit 1
          }
          Get-Item "dist\ZebraLabels.exe" | Select-Object Name, Length, LastWriteTime

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZebraLabels-windows
          path: dist/ZebraLabels.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ZebraLabels.exe
