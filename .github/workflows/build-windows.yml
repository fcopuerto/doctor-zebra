name: Build Windows EXE

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    # The signing/scanning secrets live in the `copilot` environment
    # (auto-created by GitHub Copilot when this repo was set up), not at
    # repo level. Pin the job to that environment so they resolve.
    environment: copilot
    permissions:
      contents: write   # needed to create/update GitHub Releases on tag push

    # Hoist secrets to job-level env so they're visible in step-level
    # `if:` conditions (a step's own `env:` block is NOT available in
    # its own `if:` — that gotcha cost us the SignPath/VT runs in 0.7.1).
    env:
      SP_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      VT_KEY:   ${{ secrets.VIRUSTOTAL_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          # Cache the uv download and the resolved package wheels keyed on
          # uv.lock so reruns reuse everything.
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        # Runtime deps + the pure-Python SQL Server driver (so the .exe
        # can talk to MSSQL out of the box) + pyinstaller for packaging.
        # pyodbc is intentionally left out: it needs the Microsoft ODBC
        # Driver 18 installed at the OS level, which can't be embedded.
        run: uv sync --extra mssql-pure --group build --frozen

      - name: Build executable
        run: uv run pyinstaller --noconfirm --clean build_desktop.spec

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\ComandanteZebra.exe")) {
            Write-Error "dist\ComandanteZebra.exe not found after build"
            exit 1
          }
          Get-Item "dist\ComandanteZebra.exe" | Select-Object Name, Length, LastWriteTime

      # -----------------------------------------------------------------
      # Code signing via SignPath.io Foundation (free for OSS).
      #
      # Activates when SIGNPATH_API_TOKEN secret is configured on the
      # repo (Settings → Secrets and variables → Actions → New secret).
      # The token must have "Submit signing requests" permission on
      # the COMANDANTE_ZEBRA project.
      #
      # When configured, SignPath downloads the unsigned artifact, signs
      # it with the Foundation OV cert, and returns the signed binary.
      # We move it back over dist/ComandanteZebra.exe so the rest of the
      # pipeline (SHA-256, VirusTotal, upload, release) runs on the
      # signed binary.
      # -----------------------------------------------------------------
      - name: Upload unsigned binary (for SignPath to fetch)
        if: env.SP_TOKEN != ''
        id: upload-unsigned
        env:
          SP_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        uses: actions/upload-artifact@v4
        with:
          name: ComandanteZebra-unsigned
          path: dist/ComandanteZebra.exe
          if-no-files-found: error
          retention-days: 1

      - name: Sign with SignPath
        if: env.SP_TOKEN != ''
        id: signpath
        # Don't abort the whole pipeline if signing fails — we still want
        # an .exe (unsigned) in the Release. The release notes will mark
        # it as ⚠️ No firmado so users can tell.
        continue-on-error: true
        env:
          SP_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 'f00bea23-b559-4e09-8c5f-85108bb4aa7d'
          project-slug: 'COMANDANTE_ZEBRA'
          signing-policy-slug: 'release_policy'
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: 'dist/signed'

      - name: Replace unsigned with signed binary
        if: steps.signpath.outcome == 'success'
        shell: pwsh
        run: |
          Move-Item -Force dist/signed/ComandanteZebra.exe dist/ComandanteZebra.exe
          Write-Host "Replaced unsigned binary with SignPath-signed one."
          Get-AuthenticodeSignature dist/ComandanteZebra.exe | Format-List

      - name: Compute SHA-256 checksum
        shell: pwsh
        run: |
          # Publishing the SHA-256 lets users verify they downloaded the
          # exact bytes our CI built — the closest thing to a signature
          # we can offer without a paid code-signing cert.
          $hash = (Get-FileHash dist\ComandanteZebra.exe -Algorithm SHA256).Hash.ToLower()
          $line = "$hash  ComandanteZebra.exe"
          Set-Content -Path dist\ComandanteZebra.exe.sha256 -Value $line -Encoding ascii
          Write-Host "SHA-256: $hash"

      - name: VirusTotal scan
        # Optional: only runs if a VIRUSTOTAL_API_KEY repo secret is set.
        # Get a free key at https://www.virustotal.com/gui/my-apikey and
        # add it under Settings → Secrets and variables → Actions.
        # GitHub doesn't allow `secrets.X` in `if:` conditions directly,
        # so we shadow it into env first and gate on that.
        id: vt
        if: env.VT_KEY != ''
        env:
          VT_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          files: |
            dist/ComandanteZebra.exe

      - name: Show VirusTotal result
        if: steps.vt.outcome == 'success'
        shell: pwsh
        run: |
          Write-Host "VirusTotal analysis: ${{ steps.vt.outputs.analysis }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComandanteZebra-windows
          path: |
            dist/ComandanteZebra.exe
            dist/ComandanteZebra.exe.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release
        if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ComandanteZebra.exe
            dist/ComandanteZebra.exe.sha256
          # Append-mode body: keep any existing release notes (typed by
          # the user when they cut the tag) and add the integrity links.
          append_body: true
          body: |

            ---
            **Integridad**
            - Firma: ${{ steps.signpath.outcome == 'success' && '✅ Firmado por SignPath.io Foundation (OV)' || '⚠️ No firmado — Windows SmartScreen mostrará un aviso la primera vez' }}
            - SHA-256: ver `ComandanteZebra.exe.sha256`
            - VirusTotal: ${{ steps.vt.outputs.analysis || '_(no scan: VIRUSTOTAL_API_KEY no configurado)_' }}
